name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS release
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -v

      - name: Build macOS app bundle
        run: python scripts/build_macos.py --target app

      - name: Package app bundle
        run: |
          ditto -c -k --keepParent "dist/GeoTagCopy.app" \
            "dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-app.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: geotagcopy-macos-${{ steps.version.outputs.value }}
          path: dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-app.zip

  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -v

      - name: Build Windows app directory
        run: python scripts/build_windows.py --target app

      - name: Package app directory
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\GeoTagCopy" `
            -DestinationPath "dist\GeoTagCopy-${{ steps.version.outputs.value }}-windows-app.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: geotagcopy-windows-${{ steps.version.outputs.value }}
          path: dist/GeoTagCopy-${{ steps.version.outputs.value }}-windows-app.zip

  publish-release:
    name: Publish GitHub release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: GeoTagCopy ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: dist/*.zip

  update-latest-json:
    name: Update latest.json on website
    needs: publish-release
    runs-on: ubuntu-latest
    if: vars.AZURE_STORAGE_ACCOUNT != ''

    steps:
      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build latest.json
        env:
          VERSION: ${{ steps.version.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, datetime
          v = os.environ["VERSION"]
          repo = os.environ["REPO"]
          base = f"https://github.com/{repo}/releases/download/{v}"
          data = {
            "version": v,
            "macos": {
              "app": f"{base}/GeoTagCopy-{v}-macos-app.zip",
            },
            "windows": {
              "app": f"{base}/GeoTagCopy-{v}-windows-app.zip",
            },
            "publishedAt": datetime.datetime.now(datetime.timezone.utc)
              .isoformat(timespec="seconds"),
          }
          with open("latest.json", "w") as f:
            json.dump(data, f, indent=2)
          print(json.dumps(data, indent=2))
          PY

      - name: Upload latest.json to Azure Storage
        env:
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
        run: |
          az storage blob upload \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --account-key "$AZURE_STORAGE_ACCOUNT_KEY" \
            --container-name '$web' \
            --file latest.json \
            --name latest.json \
            --content-type "application/json; charset=utf-8" \
            --content-cache-control "public, max-age=60" \
            --overwrite \
            --only-show-errors
