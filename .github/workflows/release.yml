name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v2.0.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS release
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run tests
        run: python -m unittest discover -v

      - name: Build macOS app and executable
        run: python scripts/build_macos.py --target all

      - name: Package app bundle
        run: |
          ditto -c -k --keepParent "dist/GeoTagCopy.app" \
            "dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-app.zip"

      - name: Package one-file executable
        run: |
          chmod +x "dist/GeoTagCopy"
          ditto -c -k "dist/GeoTagCopy" \
            "dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-onefile.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geotagcopy-macos-${{ steps.version.outputs.value }}
          path: |
            dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-app.zip
            dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-onefile.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: GeoTagCopy ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-app.zip
            dist/GeoTagCopy-${{ steps.version.outputs.value }}-macos-onefile.zip
