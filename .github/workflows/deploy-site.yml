name: Deploy Static Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-site.yml"
      - "assets/icon/**"
      - "scripts/copy_site_assets.py"
      - "site/**"
  workflow_run:
    workflows:
      - Build and Release
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy site to Azure Storage
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    env:
      AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
      AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
      REPO_VARIABLES_JSON: ${{ toJson(vars) }}
      STRIPE_DONATE_LINK: ${{ secrets.STRIPE_DONATE_LINK }}
      SUPPORT_URL: ${{ vars.SUPPORT_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install site asset dependency
        run: python -m pip install "Pillow>=10.0.0"

      - name: Prepare site assets
        run: python scripts/copy_site_assets.py

      - name: Template site config
        run: |
          python - <<'PY'
          import os
          import json
          from pathlib import Path

          config = Path("site/config.js")
          repo_variables = json.loads(os.environ.get("REPO_VARIABLES_JSON", "{}"))
          stripe_link = os.environ.get("STRIPE_DONATE_LINK", "") or repo_variables.get("STRIPE_PAYMENT_LINK", "")
          config.write_text(
              config.read_text(encoding="utf-8").replace(
                  "__STRIPE_PAYMENT_LINK__",
                  stripe_link,
              ),
              encoding="utf-8",
          )
          PY

      - name: Validate Azure configuration
        run: |
          test -n "$AZURE_STORAGE_ACCOUNT" || (echo "AZURE_STORAGE_ACCOUNT variable is required" && exit 1)
          test -n "$AZURE_STORAGE_ACCOUNT_KEY" || (echo "AZURE_STORAGE_ACCOUNT_KEY secret is required" && exit 1)
          az version

      - name: Ensure static website is enabled
        run: |
          az storage blob service-properties update \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --account-key "$AZURE_STORAGE_ACCOUNT_KEY" \
            --static-website \
            --index-document index.html \
            --404-document 404.html \
            --only-show-errors

      - name: Upload site files
        run: |
          az storage blob upload-batch \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --account-key "$AZURE_STORAGE_ACCOUNT_KEY" \
            --destination '$web' \
            --source site \
            --overwrite \
            --content-cache-control "public, max-age=300" \
            --only-show-errors

      - name: Set content types
        run: |
          python - <<'PY'
          import mimetypes
          import os
          import subprocess
          from pathlib import Path

          content_types = {
              ".css": "text/css; charset=utf-8",
              ".html": "text/html; charset=utf-8",
              ".ico": "image/x-icon",
              ".js": "application/javascript; charset=utf-8",
              ".json": "application/json; charset=utf-8",
              ".png": "image/png",
              ".svg": "image/svg+xml",
              ".txt": "text/plain; charset=utf-8",
              ".xml": "application/xml; charset=utf-8",
          }

          account = os.environ["AZURE_STORAGE_ACCOUNT"]
          key = os.environ["AZURE_STORAGE_ACCOUNT_KEY"]

          for path in Path("site").rglob("*"):
              if not path.is_file():
                  continue
              blob_name = path.relative_to("site").as_posix()
              content_type = content_types.get(path.suffix.lower())
              if not content_type:
                  content_type = mimetypes.guess_type(path.name)[0] or "application/octet-stream"
              subprocess.run(
                  [
                      "az",
                      "storage",
                      "blob",
                      "update",
                      "--account-name",
                      account,
                      "--account-key",
                      key,
                      "--container-name",
                      "$web",
                      "--name",
                      blob_name,
                      "--content-type",
                      content_type,
                      "--content-cache-control",
                      "public, max-age=300",
                      "--only-show-errors",
                  ],
                  check=True,
              )
          PY

      - name: Show site URL
        run: |
          echo "Site deployed to ${SUPPORT_URL:-the configured Azure Storage static website endpoint}"
